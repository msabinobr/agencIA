name: Deploy to GitHub Pages

on:
  # Dispara o deploy sempre que houver um push na branch main ou master
  push:
    branches:
      - main
      - master
  # Permite rodar este workflow manualmente pela aba Actions
  workflow_dispatch:

# Define as permissões necessárias para o GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy concorrente por vez
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Job de build e deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload do artefato (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
